<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <title>ChatBOT</title>
    </head>
    <body>
        <div class="chat-box">
            <h1>Model: ChatBOT 5.1</h1>
            <div class="texts">
                <hr>
                <div class="user">
                    <h2>Hello</h2>
                </div>
                <h2>Hello 👋 How can I help you today?</h2>
                <div class="user">
                    <h2>This is a test, say something cool</h2>
                </div>
                <h2>Absolutely. HTML and CSS is cool! 🔥</h2>
                <div class="user">
                    <h2>For real</h2>
                </div>
                <h2>Fr! What else is on your mind?</h2>
                <div class="user">
                    <h2>I'm trying to fill the chat up</h2>
                </div>
                <h2>Haha I see! Lets fill it it! 😃</h2>
                <div class="user">
                    <h2>Lets goo</h2>
                </div>
            </div>
        </div>
        <div class="main-box">
            <h1>What's on your mind today?</h1>
            <div class="message-box">
                <input class="msg-box"type="text" placeholder="Ask anything">
                <div class="send-btn">
                    <a href="#">↑</a>
                </div>
            </div>
            <div class="other-options">
                <a href="#">F</a> <!-- Files -->
                <a href="#">M</a> <!-- Media -->
                <a href="#">M</a> <!-- Model -->
                <a href="#">D</a> <!-- Deep Research -->
            </div>
        </div>
    </body>
</html>
