<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="signup.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&">
    <title>Register</title>
</head>
    <body>
        <div class="navbar">
            <nav>
                <a class="navs" href="../index.html">
                    <span class="material-symbols-outlined">home</span>
                    <div class="name">home</div>
                </a>
                <a class="navs" href="../settings/settings.html">
                    <span class="material-symbols-outlined">settings</span>
                    <div class="name">settings</div>
                </a>
                <a class="navs" href="../profile/profile.html">
                    <span class="material-symbols-outlined">account_circle</span>
                    <div class="name">profile</div>
                </a>
                <a class="navs" href="login.html">
                    <span class="material-symbols-outlined">login</span>
                    <div class="name">login</div>
                </a>
            </nav>
        </div>

        <div class="container">
            <div class="card">
                <h1>Register</h1>
                <div class="inputs">
                    <input type="text" placeholder="Username">
                    <input type="email" placeholder="Email">
                    <input type="password" placeholder="Password">
                    <input type="password" placeholder="Confirm password">
                    <input type="date">
                </div>
                <label class="remember">
                    <input type="checkbox">
                    Remember me
                </label>
                <label class="remember">
                    <input type="checkbox">
                    Count me in for deals and updates
                </label>
                <a class="btn" href="../index.html">Sign up</a>
                <p class="register">Already have an account? <a href="login.html"><span>Login</span></a></p>
            </div>
        </div>
    </body>
</html>
