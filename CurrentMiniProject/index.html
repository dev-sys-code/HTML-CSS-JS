<!DOCTYPE html>

<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css">
        <meta charset="UTF-8">
        <title>Sign in</title>
    </head>
    <body>
        <form>
            <div>
                <h1>Welcome back</h1>
                <p>Sign in with your credentials to access dashboard</p>
            </div>
            
            <section class="inputs">
                <input class="text-input" type="text" placeholder="Username">
                <input class="text-input" type="password" placeholder="Password">
            </section>

            <div class="remember-me">
                <input type="checkbox">Remember me
            </div>

            <div class="login-div">
                <button type="submit" class="login-btn">Login</button>
            </div>

            <section class="secondary">
                <a href="#">Forgot password</a>
                <span>|</span>
                <a href="#">Create account</a>
            </section>
            <h1 class="or">or</h1>
            <section class="external-logins">
                <div class="external">
                    <img src="https://freepnglogo.com/images/all_img/google-logo-2025-6ffb.png" alt="Google" height="25">
                    Sign in with Google
                </div>

                <div class="external">
                    <img src="https://www.freepnglogos.com/uploads/microsoft-office-png-logo/microsoft-logo-icon-png-transparent-19.png" alt="Microsoft" height="25">
                    Sign in with Microsoft
                </div>
                
                <div class="external">
                    <img src="https://www.pngmart.com/files/23/Github-Logo-PNG-File-1.png" alt="Github" height="25">
                    Sign in with Github
                </div>
            </section>
        </form>
    </body>
</html>
