<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title>Main Page</title>
    </head>
    <body>
        <div class="navbar">
            <nav>
                <a class="navs"href="index.html">Home</a>
                <a class="navs"href="settings.html">Settings</a>

                    <h1 class="stat">Time Spent: 1d 1h 1m</h1>
                    <h1 class="stat">Levels completed: 0</h1>
                </div>
                <div class="graph">
                    <h4><u>Stats</u></h4></h4>
                    <h1 class="stat">Time Spent: 1d 1h 1m</h1>
