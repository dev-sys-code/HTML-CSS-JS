<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <title>Login</title>
    </head>
    <body>
        <nav>
            <a href="#">Home</a>
        </nav>

        <form>
            <h1>Login</h1>
            <section class="text-inputs">
                <label for="username">Username</label>
                <input type="text" id="username">

                <label for="password">Password</label>
                <input type="password" id="password">
            </section>

            <section class="secondary-options">
                <label>
                    <input type="checkbox">
                    Remember me
                </label>

                <a href="#">Forgot password?</a>
            </section>

            <button type="submit" class="login-btn">Login</button>

            <h1 class="or">or</h1>

            <section class="external-logins">
                <div class="external">
                    <img src="https://freepnglogo.com/images/all_img/google-logo-2025-6ffb.png" height="25">
                    Sign in with Google
                </div>

                <div class="external">
                    <img src="https://avatars.githubusercontent.com/u/31075795?s=280&v=4" height="25">
                    Sign in with Microsoft
                </div>
            </section>
        </form>
    </body>
</html>
