<!DOCTYPE html>
<html>
    <head>
        <title>OS</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main>
            <div class="notch"></div>
            <div class="home-screen">
                <h1 class="date">Mon 9 Sep</h1>
            </div>
            <div class="time-div">
                <h1 class="time">09:41</h1>
            </div>
            <div class="clear-all-div">
                <h1 class="noti-centre">Notification Centre</h1>
                <h1 class="clear-all">Clear all</h1>
            </div>
            <div class="notifications">
                <div class="notification">
                    <img class="noti-img" src="https://static.vecteezy.com/system/resources/previews/023/986/921/original/tiktok-logo-tiktok-logo-transparent-tiktok-icon-transparent-free-free-png.png" height="50">
                    <div class="noti-second-txt">
                        <h1 class="notification-heading">Tiktok</h1>
                        <p class="notification-p">User0 Started following you</p>
                    </div>
                </div>

                <div class="notification">
                    <img class="noti-img" src="https://static.vecteezy.com/system/resources/previews/042/127/160/non_2x/instagram-logo-on-circle-style-with-transparent-background-free-png.png" height="50">
                    <div class="noti-second-txt">
                        <h1 class="notification-heading">Instagram</h1>
                        <p class="notification-p">Insta-User Started following you</p>
                    </div>
                </div>
            </div>
        </main>
        <div class="charger-whole">
            <div class="charger-1"></div>
            <div class="charger-2"></div>
        </div>
        <h1 class="swipe">_____</h1>

        <div class="option-one-left"></div>
        <div class="option-one-right"></div>
    </body>
</html>
