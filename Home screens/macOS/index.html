<!DOCTYPE html>
<html>
    <head>
        <title>macOS</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main>
            <div class="main-text">
                <h1 class="date">Mon 9 Sep</h1>
                <h1 class="time">09:41</h1>

            </div>
        </main>
        <div class="keyboard">
            <div class="keys">
                <div class="first-row">
                    <div class="key-size-one">esc</div>
                    <div class="key">F1</div>
                    <div class="key">F2</div>
                    <div class="key">F3</div>
                    <div class="key">F4</div>
                    <div class="key">F5</div>
                    <div class="key">F6</div>
                    <div class="key">F7</div>
                    <div class="key">F8</div>
                    <div class="key">F9</div>
                    <div class="key">F10</div>
                    <div class="key">F11</div>
                    <div class="key">F12</div>
                    <div class="key"></div>
                </div>

                <div class="second-row">
                    <div class="key">§</div>
                    <div class="key">1</div>
                    <div class="key">2</div>
                    <div class="key">3</div>
                    <div class="key">4</div>
                    <div class="key">5</div>
                    <div class="key">6</div>
                    <div class="key">7</div>
                    <div class="key">8</div>
                    <div class="key">9</div>
                    <div class="key">0</div>
                    <div class="key">-</div>
                    <div class="key">=</div>
                    <div class="key-size-one">back</div>
                </div>

                <div class="third-row">
                    <div class="key-size-one">tab</div>
                    <div class="key">Q</div>
                    <div class="key">W</div>
                    <div class="key">E</div>
                    <div class="key">R</div>
                    <div class="key">T</div>
                    <div class="key">Y</div>
                    <div class="key">U</div>
                    <div class="key">I</div>
                    <div class="key">O</div>
                    <div class="key">P</div>
                    <div class="key">[</div>
                    <div class="key">]</div>
                    <div class="key">ent</div>
                </div>

                <div class="forth-row">
                    <div class="key-size-two">caps</div>
                    <div class="key">A</div>
                    <div class="key">S</div>
                    <div class="key">D</div>
                    <div class="key">F</div>
                    <div class="key">G</div>
                    <div class="key">H</div>
                    <div class="key">J</div>
                    <div class="key">K</div>
                    <div class="key">L</div>
                    <div class="key">:</div>
                    <div class="key">"</div>
                    <div class="key">|</div>
                    <div class="enter-second"></div>
                </div>

                <div class="fifth-row">
                    <div class="key-size-three">shift</div>
                    <div class="key">Z</div>
                    <div class="key">X</div>
                    <div class="key">C</div>
                    <div class="key">V</div>
                    <div class="key">B</div>
                    <div class="key">N</div>
                    <div class="key">M</div>
                    <div class="key"><</div>
                    <div class="key">></div>
                    <div class="key">?</div>
                    <div class="key-size-four">shift</div>
                </div>

                <div class="sixth-row">
                    <div class="key">fn</div>
                    <div class="key">ctrl</div>
                    <div class="key">opt</div>
                    <div class="key-size-three">cmd</div>
                    <div class="space">_</div>
                    <div class="key-size-three">cmd</div>
                    <div class="key">opt</div>
                    <div class="arrows">
                        <div class="left">←</div>
                        <div class="right">→</div>
                        <div class="up">↑</div>
                        <div class="down">↓</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="notch"></div>
        <div class="login">
            <img class="profile" src="https://avatars.githubusercontent.com/u/142793020?v=4" height="35">
            <h1 class="profile-text">Kayden King</h1>
            <h1 class="profile-subtext">Touch ID or Enter Password</h1>
        </div>
    </body>
</html>
