<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <title>Sign up page</title>
    </head>
    <body>
        <form>
            <h1>Sign up</h1>
            <div class="inputs">
                <label class="main-stuff">
                    Username
                    <input class="single-inputs" type="text">
                </label>

                <label class="main-stuff">
                    Email
                    <input class="single-inputs" type="email">
                </label>

                <label class="main-stuff">
                    Date of birth
                    <input class="single-inputs" type="date">
                </label>

                <label class="main-stuff">
                    Password
                    <input class="single-inputs"  type="password">
                </label>

                <label class="main-stuff">
                    Confirm password
                    <input class="single-inputs"  type="password">
                </label>

                <label class="other">
                    <input type="checkbox">
                    Allow us to send marketing emails
                </label>
                <label class="other">
                    <input type="checkbox">
                    Agree to <strong>Terms of service</strong> and <strong>Privacy policy</strong>
                </label>
            </div>
            <div class="sign-up">
                <button class="create-account-btn">Create account</button>
            </div>
            <label>
                Already have an account? <a href="#"><strong>Login</strong></a>
            </label>
        </form>
    </body>
</html>
