<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title>Login Page</title>
    </head>
    <body>
        <div class="LoginPage">
            <h3><em><u>sign-in page</u></em></h3>
            <div class="boxes">
                <input class="u" type="text" placeholder="Username">
                <input class="p" type="password" placeholder="Password">
            </div>
            <div class="noaccount">
                <a href="sign-up-page.html">No account?<strong> Sign up now</strong></a>
                <h3>or</h3>
            </div>
            <div class="external">
                <div class="google">
                    <img src="https://clipartcraft.com/images/transparent-background-google-logo-high-resolution-9.png" height="10" width="10">
                    <h6>Sign in with google</h6>
                </div>
                <div class="microsoft">
                    <img src="https://www.freepnglogos.com/uploads/microsoft-window-logo-emblem-0.png"height="10", width="10">
                    <h6>Sign in with microsoft</h6>
                </div>
            </div>
        </div>
    </body>
</html>
