<!DOCTYPE html>

<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css">
        <meta charset="UTF-8">
        <title>Linktree</title>
    </head>
    <body>

            <div class="pfp">
                <img src="https://avatars.githubusercontent.com/u/142793020?v=4" alt="profile picture" height="100">

            <section>
                <div class="link">

                </div>

                <div class="link">
                    <img src="https://static.vecteezy.com/system/resources/thumbnails/020/964/378/small_2x/youtube-icon-for-web-design-free-png.png" alt="youtube" height="25">
                    <a href="https://youtube.com/@dev.sys-code?si=_p5BWUlApTMyFRCS">YouTube</a>                   
                </div>
                    <div class="link">
                    <img src="https://www.pngarts.com/files/8/Github-Logo-PNG-Image-Background.png" alt="github" height="25">
                    <a href="https://github.com/dev-sys-code">GitHub</a>
                </div>
            </section>
        </main>
    </body>
</html>
