<!DOCTYPE html>

<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css">
        <meta charset="UTF-8">
        <title>Login page</title>
    </head>
    <body>
        <form>
            <div class="blob"></div>
            <div class="blob"></div>
            <div class="blob"></div>
            <div class="blob"></div>
            <div class="blob"></div>
            <div class="blob"></div>
            <div>
                <h1>Welcome</h1>
                <p>Enter credentials to access the dashboard</p>
            </div>
            <section class="inputs">
                <input class="single-input" type="text" placeholder="Username">
                <input class="single-input" type="password" placeholder="Password">
            </section>
            <div class="remember-me">
                <input type="checkbox">
                <label for="checkbox">Remember me</label>
            </div>
            <button>Login</button>
            <div class="other">
                <a href="#">Forgot password</a>
                <span>|</span>
                <a href="#">Create account</a>
            </div>
            <h1 class="or">or</h1>
            <section class="external-logins">
                <div class="external">
                    <img src="https://www.svgrepo.com/show/353817/google-icon.svg" alt="Google" height="30">
                    Sign in with Google
                </div>

                <div class="external">
                    <img src="https://wallpapers.com/images/featured-full/microsoft-logo-png-60ssshbz4hzrtwn0.png" alt="Microsoft" height="30">
                    Sign in with Microsoft
                </div>

                <div class="external">
                    <img src="https://www.pngmart.com/files/23/Github-Logo-PNG-Pic.png" alt="GitHub" height="30">
                    Sign in with GitHub
                </div>
            </section>
        </form>
    </body>
</html>
