<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <title>Login Page</title>
    </head>
    <body>
        <form>
            <h1>Login</h1>
            <section class="main-text-input-section">
                <label for="username" class="main-label">
                    Username
                    <input class="typing-inputs" type="text">
                </label>
                <label class="main-label">
                    Password
                    <input class="typing-inputs" type="password">
                </label>
            </section>
            <section class="secondary">
                <label>
                    <input type="checkbox">
                    Remember me
                </label>
                <a href="#">Forgot password?</a>
            </section>
            <button type="submit" class="login-btn">Login</button>
        </form>
    </body>
</html>
