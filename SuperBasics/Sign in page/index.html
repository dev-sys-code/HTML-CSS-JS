<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css">
        <title>Login page</title>
    </head>
    <body>
        <aside>
            <section>
                <a href="#"><strong>Home</strong></a>
            </section>
        </aside>
        <form>
            <h1>Login</h1>
            <section class="inputs">
                <label class="label">
                    Username
                    <input class="input" type="text">
                </label>

                <label class="label">
                    Password
                    <input class="input" type="password">
                </label>
            </section>

            <section class="secondary">
                <label>
                    <input type="checkbox">
                    Remember me
                </label>
                <a href="#"><strong>Forgot password?</strong></a>
            </section>

            <section class="third">
                <button type="submit" class="login-btn">Login</button>
                <a href="#">Forgot password? <strong>Register</strong></a>
            </section>
        </form>
    </body>
</html>
