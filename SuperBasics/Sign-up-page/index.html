
<html>
    <head>
        <title>Sign up Page</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <bosdy>
        <div class="main-box">
            <h1>Sign up</h1>
            <div class="input-boxes">
                <input class="txt"type="text" placeholder="Username">
                <input class="txt"type="email" placeholder="Email">
                <input class="txt"type="date">
                <input class="txt"type="password" placeholder="Password">
                <input class="txt"type="password" placeholder="Confirm Password">
            </div>
            <div class="selects">
                <div class="checkbox">
                    <input class="check"type="checkbox">Remember me
                </div>
                <div class="checkbox">
                    <input class="check"type="checkbox">Recieve emails about deals, offers
                </div>
                <div class="signup-box">
                    <a class="login" href="#">Sign up</a>
                </div>
            </div>
        </div>
    </bosdy>
</html>
